services:
    sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: inventario-ventas-sqlserver
        environment:
            ACCEPT_EULA: "Y"
            MSSQL_SA_PASSWORD: "ContraseñaPrueba123!"
            MSSQL_PID: "Developer"
        ports:
            - "1434:1433"
        volumes:
            - sqlserver-data:/var/opt/mssql
        healthcheck:
            test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    sqlserver-data: